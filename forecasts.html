<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forecast</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <header class="header">
        <h1>Bandra</h1>
        <p class="subtitle">7-Day Weather Forecast</p>
    </header>

    <!-- Highlight Card -->
    <section class="highlight-card">
        <div>
            <h2>32°C</h2>
            <p>Sunny</p>
        </div>
        <img src="https://openweathermap.org/img/wn/01d@2x.png">
    </section>

    <!-- Hourly -->
    <section class="hourly">
        <h3>Hourly Forecast</h3>

        <div class="hourly-scroll">

            <div class="hour-card active">
                <p>Now</p>
                <img src="https://openweathermap.org/img/wn/01d@2x.png">
                <p>32°</p>
            </div>

            <div class="hour-card">
                <p>2 PM</p>
                <img src="https://openweathermap.org/img/wn/03d@2x.png">
                <p>33°</p>
            </div>

            <div class="hour-card">
                <p>4 PM</p>
                <img src="https://openweathermap.org/img/wn/10d@2x.png">
                <p>30°</p>
            </div>

            <div class="hour-card">
                <p>6 PM</p>
                <img src="https://openweathermap.org/img/wn/04d@2x.png">
                <p>29°</p>
            </div>

            <div class="hour-card">
                <p>8 PM</p>
                <img src="https://openweathermap.org/img/wn/01n@2x.png">
                <p>27°</p>
            </div>

        </div>
    </section>

    <!-- Weekly -->
    <section class="weekly">
        <h3>Next 7 Days</h3>

        <div class="day-row">
            <span>Monday</span>
            <img src="https://openweathermap.org/img/wn/01d@2x.png">
            <span>34° / 26°</span>
        </div>

        <div class="day-row">
            <span>Tuesday</span>
            <img src="https://openweathermap.org/img/wn/03d@2x.png">
            <span>33° / 25°</span>
        </div>

        <div class="day-row">
            <span>Wednesday</span>
            <img src="https://openweathermap.org/img/wn/10d@2x.png">
            <span>30° / 24°</span>
        </div>

        <div class="day-row">
            <span>Thursday</span>
            <img src="https://openweathermap.org/img/wn/10d@2x.png">
            <span>29° / 23°</span>
        </div>

        <div class="day-row">
            <span>Friday</span>
            <img src="https://openweathermap.org/img/wn/04d@2x.png">
            <span>31° / 24°</span>
        </div>

        <div class="day-row">
            <span>Saturday</span>
            <img src="https://openweathermap.org/img/wn/01d@2x.png">
            <span>35° / 26°</span>
        </div>

        <div class="day-row">
            <span>Sunday</span>
            <img src="https://openweathermap.org/img/wn/01d@2x.png">
            <span>36° / 27°</span>
        </div>

    </section>

</div>

</body>
</html>
